<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fare Calculator - Bohol Move</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #0d6efd;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0b5ed7;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🚍 Fare Calculator</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- ORIGIN -->
        <label>Origin</label>
        <select name="origin" title="Select origin">
            {% for route in routes %}
                <option value="{{ route.origin }}">{{ route.origin }}</option>
            {% endfor %}
        </select>

        <!-- DESTINATION -->
        <label>Destination</label>
        <select name="destination" title="Select destination">
            {% for route in routes %}
                <option value="{{ route.destination }}">{{ route.destination }}</option>
            {% endfor %}
        </select>

        <button type="submit">Calculate Fare</button>
    </form>

    {% if result %}
        <div class="result">
            Result: ₱{{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
