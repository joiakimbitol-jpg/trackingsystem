<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Trips - Bohol Move</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>

<h1>🚍 Available Trips</h1>

<table>
    <tr>
        <th>Driver</th>
        <th>Vehicle</th>
        <th>Route</th>
        <th>Status</th>
    </tr>

    {% for trip in trips %}
    <tr>
        <td>{{ trip.driver }}</td>
        <td>{{ trip.vehicle }}</td>
        <td>{{ trip.route }}</td>
        <td>{{ trip.status }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
