<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BOHOL MOVE</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }

        form p {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .errorlist {
            color: red;
            list-style: none;
            padding: 0;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            color: #666666;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>🚌 BOHOL MOVE Login</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Login</button>
        </form>

        <div class="footer">
            © 2026 BOHOL MOVE
        </div>
    </div>

</body>
</html>
